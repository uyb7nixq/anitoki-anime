<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anitoki – Nonton Anime Subtitle Indonesia</title>
    <meta name="description"
        content="Anitoki adalah platform streaming anime subtitle Indonesia terlengkap. Nonton anime terbaru dan terpopuler secara gratis di anitoki.id" />
    <link rel="canonical" href="https://anitoki.id/" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 480px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #f1f5f9;
        }

        p {
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            text-decoration: none;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .links {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #6366f1;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">Anitoki</div>
        <h1>Nonton Anime Subtitle Indonesia</h1>
        <p>
            Platform streaming anime terlengkap dengan subtitle Indonesia.
            Temukan anime terbaru, terpopuler, dan klasik favorit kamu — gratis dan tanpa iklan mengganggu.
        </p>
        <a href="https://anitoki.id/" class="btn" rel="dofollow">Kunjungi Anitoki.id →</a>
        <div class="links">
            <a href="https://anitoki.id/anime" rel="dofollow">Daftar Anime</a>
            <a href="https://anitoki.id/genres" rel="dofollow">Genre Anime</a>
            <a href="https://anitoki.id/changelog" rel="dofollow">Changelog</a>
        </div>
    </div>
</body>

</html>
